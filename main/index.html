<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snip — URL Shortener</title>
</head>
<body>

  <div class="app">

    <!-- HEADER -->
    <header class="header">
      <h1 class="logo">snip.</h1>
      <p class="tagline">Shorten. Share. Simple.</p>
    </header>

    <!-- MAIN INPUT SECTION -->
    <main class="main">
      <div class="input-card">
        <input
          type="url"
          id="url-input"
          class="url-input"
          placeholder="Paste a long URL here..."
        />
        <button id="shorten-btn" class="shorten-btn">Shorten</button>
      </div>

      <!-- RESULT (hidden until a URL is shortened) -->
      <div class="result" id="result" hidden>
        <span id="short-url" class="short-url"></span>
        <button id="copy-btn" class="copy-btn">Copy</button>
      </div>
    </main>

    <!-- HISTORY SECTION -->
    <section class="history" id="history">
      <h2 class="history-title">Recent Links</h2>
      <ul class="history-list" id="history-list">
        <!-- Links will be injected here by JavaScript -->
      </ul>
    </section>

  </div>

</body>
</html>
